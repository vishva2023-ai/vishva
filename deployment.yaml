apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: html-demo
  template:
    metadata:
      labels:
        app: html-demo
    spec:          # This must be indented under 'template'
      containers:   
      - name: html-demo
        image: vishva2023ai/html-demo:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: html-demo-service
spec:
  type: NodePort
  selector:
    app: html-demo
  ports:
   - port: 80
     targetPort: 80
     nodePort: 30007  # Note: Ensure this is in the range 30000-32767
